<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Product Details - SmartMob Hub</title>
    <!-- Poppins Font for professional look -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        :root { --royal-purple: #6c63ff; --soft-white: #ffffff; --text-dark: #333; }
        body { font-family: 'Poppins', sans-serif; background-color: var(--soft-white); margin: 0; color: var(--text-dark); }
        
        .container { max-width: 1200px; margin: 50px auto; padding: 20px; display: flex; gap: 50px; flex-wrap: wrap; }
        
        /* Product Image Section */
        .product-image-container { flex: 1; min-width: 300px; text-align: center; }
        .main-img { width: 100%; border-radius: 10px; box-shadow: 0 5px 15px rgba(0,0,0,0.1); }

        /* Product Info Section */
        .product-info { flex: 1; min-width: 300px; }
        .breadcrumb { font-size: 12px; color: #888; text-transform: uppercase; margin-bottom: 10px; }
        .product-title { font-size: 32px; font-weight: 600; margin-bottom: 15px; color: var(--text-dark); }
        .price-tag { font-size: 24px; color: var(--royal-purple); font-weight: 600; margin-bottom: 20px; }
        .description { line-height: 1.6; color: #666; margin-bottom: 30px; }

        /* Add to Cart Area */
        .cart-action { display: flex; gap: 15px; align-items: center; margin-bottom: 40px; }
        .quantity-btn { border: 1px solid #ddd; padding: 10px 15px; background: white; cursor: pointer; border-radius: 5px; }
        .add-to-cart-btn { background: var(--royal-purple); color: white; padding: 15px 40px; border: none; border-radius: 5px; font-weight: 600; cursor: pointer; transition: 0.3s; flex-grow: 1; }
        .add-to-cart-btn:hover { background: #554bc3; transform: translateY(-2px); }

        /* Reviews Section */
        .reviews-container { width: 100%; margin-top: 50px; border-top: 1px solid #eee; padding-top: 40px; }
        .review-flex { display: flex; gap: 40px; flex-wrap: wrap; }
        .existing-reviews { flex: 2; }
        .add-review-box { flex: 1; border: 2px solid var(--royal-purple); padding: 25px; border-radius: 10px; }
        input, textarea { width: 100%; padding: 10px; margin: 10px 0; border: 1px solid #ddd; border-radius: 5px; box-sizing: border-box; }
    </style>
</head>
<body>

<div class="container">
    <!-- Image Box -->
    <div class="product-image-container">
        <img id="productImg" src="placeholder.jpg" alt="Product" class="main-img">
    </div>

    <!-- Info Box -->
    <div class="product-info">
        <div class="breadcrumb">Home / Mobile Accessories</div>
        <h1 id="productTitle" class="product-title">Premium Smartphone</h1>
        <div class="price-tag">Rs <span id="productPrice">0</span></div>
        <p class="description">
            High-quality mobile accessory designed for durability and high-energy performance. 
            Perfectly fits your modern lifestyle.
        </p>
        
        <div class="cart-action">
            <input type="number" id="qty" value="1" min="1" style="width: 60px; text-align: center;">
            <button class="add-to-cart-btn" onclick="addToCart()">ADD TO CART</button>
        </div>
    </div>

    <!-- Reviews Section -->
    <!-- Reviews Section -->
<div class="reviews-container" style="margin-top: 50px; border-top: 1px solid #eee; padding-top: 40px;">
    <h2 id="reviewCount" style="color: var(--text-dark); margin-bottom: 30px;">0 Reviews</h2>
    
    <div class="review-flex" style="display: flex; gap: 40px; flex-wrap: wrap;">
        
        <!-- Left Side: Existing Reviews List (As per image_5c341e.png) -->
        <div id="reviewsList" style="flex: 2; min-width: 300px;">
            <p style="color: #888;">Loading reviews...</p>
        </div>
        
        <!-- Right Side: Add a Review Box (Royal Purple Theme) -->
        <div class="add-review-box" style="flex: 1; min-width: 300px; border: 2px solid #6c63ff; padding: 25px; border-radius: 10px; background: #fff;">
            <h3 style="margin-top: 0; color: #6c63ff;">Add a review</h3>
            <p style="font-size: 13px; color: #666;">Your email address will not be published. Required fields are marked *</p>
            
            <label style="font-size: 14px; font-weight: 600;">Your rating *</label>
            <div style="color: #ddd; font-size: 20px; margin: 10px 0;">★★★★★</div>

            <label style="font-size: 14px; font-weight: 600;">Your review *</label>
            <textarea id="revText" rows="5" style="width: 100%; padding: 10px; margin: 10px 0; border: 1px solid #ddd; border-radius: 5px;"></textarea>
            
            <label style="font-size: 14px; font-weight: 600;">Name *</label>
            <input type="text" id="revName" style="width: 100%; padding: 10px; margin: 10px 0; border: 1px solid #ddd; border-radius: 5px;">
            
            <label style="font-size: 14px; font-weight: 600;">Email *</label>
            <input type="email" id="revEmail" style="width: 100%; padding: 10px; margin: 10px 0; border: 1px solid #ddd; border-radius: 5px;">
            
            <button class="add-to-cart-btn" onclick="submitReview()" style="background: #6c63ff; color: white; width: 100%; padding: 15px; border: none; border-radius: 5px; font-weight: bold; cursor: pointer; margin-top: 10px;">
                SUBMIT REVIEW
            </button>
        </div>
    </div>
</div>

<script>
    // 1. Fetch Reviews from Supabase on Page Load
    async function loadReviews() {
        const { data: reviews, error } = await _supabase
            .from('reviews')
            .select('*')
            .order('created_at', { ascending: false });

        if (error) {
            console.log("Error loading reviews", error);
            return;
        }

        const reviewsList = document.getElementById('reviewsList');
        const reviewCount = document.getElementById('reviewCount');
        
        reviewCount.innerText = `${reviews.length} reviews for this product`;
        
        if (reviews.length === 0) {
            reviewsList.innerHTML = "<p>No reviews yet. Be the first to review!</p>";
            return;
        }

        reviewsList.innerHTML = reviews.map(rev => `
            <div style="margin-bottom: 30px; border-bottom: 1px dashed #ddd; padding-bottom: 20px; display: flex; gap: 15px;">
                <div style="width: 50px; height: 50px; background: #eee; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 20px; color: #aaa;">👤</div>
                <div>
                    <div style="color: #fbc02d;">★★★★★</div>
                    <strong style="color: #333;">${rev.name}</strong> 
                    <span style="color: #999; font-size: 12px;">– ${new Date(rev.created_at).toLocaleDateString()}</span>
                    <p style="margin: 10px 0; color: #555; font-style: italic;">"${rev.review_text}"</p>
                </div>
            </div>
        `).join('');
    }

    // 2. Submit Review to Supabase
    async function submitReview() {
        const name = document.getElementById('revName').value;
        const text = document.getElementById('revText').value;
        const email = document.getElementById('revEmail').value;

        if (!name || !text || !email) {
            alert("Please fill all fields!");
            return;
        }

        const { error } = await _supabase
            .from('reviews')
            .insert([{ name: name, review_text: text, email: email }]);

        if (error) {
            alert("Error saving review!");
        } else {
            alert("Review posted successfully!");
            location.reload(); // Page reload karke naya review dikhayenge
        }
    }

    // Page load hote hi reviews dikhao
    window.onload = loadReviews;
</script>
</script>

</body>
</html>
